name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.24', cache: true}
      - run: go mod download
      - run: make check
      - run: make build
